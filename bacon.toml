default_job = "validate-templates"

[jobs.validate-templates]
command = [
    "bash",
    "-lc",
    "./scripts/validate-templates.sh Init && ./scripts/validate-templates.sh Modules/api-db-handler generated-template && ./scripts/validate-templates.sh Modules/background-worker generated-template && ./scripts/validate-templates.sh Modules/api-gateway generated-template",
]
need_stdout = true
background = false
on_change_strategy = "kill_then_restart"
watch = ["Init", "Modules", "bacon.toml", "scripts/validate-templates.sh"]

[jobs.validate-init]
command = ["./scripts/validate-templates.sh", "Init"]
need_stdout = true
background = false
on_change_strategy = "kill_then_restart"
watch = ["Init", "bacon.toml", "scripts/validate-templates.sh"]

[jobs.validate-api-db-handler]
command = [
    "./scripts/validate-templates.sh",
    "Modules/api-db-handler",
    "generated-template",
]
need_stdout = true
background = false
on_change_strategy = "kill_then_restart"
watch = [
    "Modules/api-db-handler",
    "bacon.toml",
    "scripts/validate-templates.sh",
]

[jobs.validate-background-worker]
command = [
    "./scripts/validate-templates.sh",
    "Modules/background-worker",
    "generated-template",
]
need_stdout = true
background = false
on_change_strategy = "kill_then_restart"
watch = [
    "Modules/background-worker",
    "bacon.toml",
    "scripts/validate-templates.sh",
]

[jobs.validate-api-gateway]
command = [
    "./scripts/validate-templates.sh",
    "Modules/api-gateway",
    "generated-template",
]
need_stdout = true
background = false
on_change_strategy = "kill_then_restart"
watch = ["Modules/api-gateway", "bacon.toml", "scripts/validate-templates.sh"]
